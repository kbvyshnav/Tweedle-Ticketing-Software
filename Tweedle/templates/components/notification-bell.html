<!--
  File: templates/components/notification-bell.html
  Extracted from: base.html (Phase 10 cleanup)
  Django template: reusable {% include 'components/notification-bell.html' %}
  Usage: Django: {% include 'components/notification-bell.html' %}
  JS lives in: base.html — see "NOTIFICATION BELL TOGGLE" section
  Context variables required:
    - unread_notification_count → integer, count of unread notifications
    - notifications             → queryset, recent notifications (max 10)
-->

<!-- === NOTIFICATION BELL COMPONENT ===========================
     Django: {% include 'components/notification-bell.html' %}
     ============================================================ -->
<div class="tw-notif-bell-wrap" id="notifBellWrap">
    <button
        class="tw-notif-bell-btn"
        id="notifBellBtn"
        aria-label="Notifications"
        aria-expanded="false"
        aria-controls="notifPanel">
        <!-- Django: {% if unread_notification_count %}<i class="bx bxs-bell">{% else %}<i class="bx bx-bell">{% endif %} -->
        <i class="bx bxs-bell" aria-hidden="true"></i>
        <!-- Django: {% if unread_notification_count %} -->
        <span class="tw-notif-count-badge" id="notifCount">8</span>
        <!-- Django: {% endif %} -->
    </button>

    <div class="tw-notif-panel" id="notifPanel" role="dialog" aria-label="Notifications">
        <div class="tw-notif-panel-header">
            <span class="tw-notif-panel-title">Notifications</span>
            <button
                class="tw-btn tw-btn-outline tw-btn--sm"
                id="markAllReadBtn"
                aria-label="Mark all notifications as read">
                Mark all read
            </button>
        </div>

        <div class="tw-notif-list">
            <!-- Django: {% for notification in notifications %} -->

            <!-- Django: class="tw-notif-item {% if not notification.is_read %}unread{% endif %}" -->
            <div class="tw-notif-item unread">
                <div class="tw-notif-item-body">
                    <div class="tw-notif-type-icon tw-notif-type-icon--info">
                        <i class="bx bx-chat" aria-hidden="true"></i>
                    </div>
                    <div class="tw-notif-item-text">
                        <!-- Django: {{ notification.title }} -->
                        <div class="tw-notif-item-title">New message on GMEC25010002</div>
                        <div class="tw-notif-item-msg">
                            <!-- Django: {{ notification.actor.get_full_name }} -->
                            <span class="tw-notif-user-name">Rithik</span> sent a message in Terra pay
                        </div>
                        <!-- Django: {{ notification.timesince }} -->
                        <div class="tw-notif-item-time">5 minutes ago</div>
                    </div>
                </div>
            </div>

            <div class="tw-notif-item unread">
                <div class="tw-notif-item-body">
                    <div class="tw-notif-type-icon tw-notif-type-icon--warning">
                        <i class="bx bx-user-check" aria-hidden="true"></i>
                    </div>
                    <div class="tw-notif-item-text">
                        <div class="tw-notif-item-title">Ticket assigned — GMEC25010008</div>
                        <div class="tw-notif-item-msg">
                            Bank transfer UI fix assigned to <span class="tw-notif-user-name">Arun</span>
                        </div>
                        <div class="tw-notif-item-time">1 hour ago</div>
                    </div>
                </div>
            </div>

            <div class="tw-notif-item">
                <div class="tw-notif-item-body">
                    <div class="tw-notif-type-icon tw-notif-type-icon--success">
                        <i class="bx bx-check-circle" aria-hidden="true"></i>
                    </div>
                    <div class="tw-notif-item-text">
                        <div class="tw-notif-item-title">Ticket closed — BGEX25010098</div>
                        <div class="tw-notif-item-msg">DB Connection Pooling ticket was closed</div>
                        <div class="tw-notif-item-time">Yesterday</div>
                    </div>
                </div>
            </div>

            <!-- Django: {% endfor %} -->
        </div>

        <div class="tw-notif-panel-footer">
            <!-- Django: href="{% url 'admin_notifications' %}" -->
            <a href="#" class="tw-btn tw-btn-outline tw-btn--sm" onclick="loadPage('admin_portal/notifications.html'); return false;">View all notifications</a>
        </div>
    </div>
</div>
<!-- END NOTIFICATION BELL COMPONENT -->
