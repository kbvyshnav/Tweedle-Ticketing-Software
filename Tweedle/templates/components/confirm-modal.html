<!-- === CONFIRM / REJECT MODAL ================================
     Generic two-action confirmation overlay.
     Driven by JS openConfirmModal({ type, title, message, details, onConfirm })
     type: 'success' | 'danger'
     Django: {% include 'components/confirm-modal.html' %}
     ============================================================ -->
<div class="tw-confirm-overlay" id="confirmModal" role="dialog" aria-modal="true" aria-labelledby="confirmModalTitle">
    <div class="tw-confirm-box">

        <!-- Icon (updated by JS based on action type) -->
        <div class="tw-confirm-icon" id="confirmIcon">
            <i class="bx bx-check" aria-hidden="true"></i>
        </div>

        <!-- Title and message (updated by JS) -->
        <h3 class="tw-confirm-title" id="confirmModalTitle">Confirm Action</h3>
        <p class="tw-confirm-message" id="confirmMessage">Are you sure you want to proceed?</p>

        <!-- Detail summary (updated by JS) -->
        <div class="tw-confirm-details" id="confirmDetails">
            <!-- JS injects detail rows here -->
        </div>

        <!-- Action buttons -->
        <div class="tw-confirm-buttons">
            <button class="tw-btn tw-btn-outline" id="confirmCancelBtn" onclick="closeConfirmModal()">
                Cancel
            </button>
            <button class="tw-btn tw-btn-success" id="confirmActionBtn" onclick="executeConfirmAction()">
                Confirm
            </button>
        </div>

    </div>
</div>
<!-- END CONFIRM MODAL -->
