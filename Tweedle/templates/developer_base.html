<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tweedle — Developer Portal{% endblock %}</title>

    <!-- Django: {% load static %} -->

    <!-- 5-file CSS load order for developer portal -->
    <link rel="stylesheet" href="{% block tokens_css %}{% static 'css/tweedle-tokens.css' %}{% endblock %}">
    <link rel="stylesheet" href="{% block theme_css %}{% static 'css/themes/theme-developer.css' %}{% endblock %}">
    <link rel="stylesheet" href="{% block base_css %}{% static 'css/tweedle-base.css' %}{% endblock %}">
    <link rel="stylesheet" href="{% block components_css %}{% static 'css/tweedle-components.css' %}{% endblock %}">
    {% block page_css %}{% endblock %}

    <!-- Vendors -->
    <link href="https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="role-developer">

    <!-- Django: sidebar and topbar will be injected here at wiring time -->
    <!-- Django: For now, each developer portal page is standalone (same as client portal pattern) -->
    <!-- Django: When wiring: {% include 'developer_portal/_sidebar.html' %} -->
    <!-- Django: When wiring: {% include 'developer_portal/_topbar.html' %} -->

    <div id="devMainContent">
        {% block content %}{% endblock %}
    </div>

    <!-- Django: {% block extra_js %}{% endblock %} -->
    <!-- Django: {% csrf_token %} — include in every POST-capable page -->

    <!-- Vendors -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    {% block page_js %}{% endblock %}
</body>
</html>
