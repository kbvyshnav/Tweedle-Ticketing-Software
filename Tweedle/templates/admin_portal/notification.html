-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications — Tweedle</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600&family=Poppins:wght@400;500;600;700&display=swap">
    <!-- Django: <link rel="stylesheet" href="{% static 'vendors/boxicons/css/boxicons.min.css' %}"> -->
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css">
    <!-- Django: <link rel="stylesheet" href="{% static 'vendors/bootstrap/css/bootstrap.min.css' %}"> -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- Django: <link rel="stylesheet" href="{% static 'css/tweedle-tokens.css' %}"> -->
    <link rel="stylesheet" href="../../static/css/tweedle-tokens.css">
    <!-- Django: <link rel="stylesheet" href="{% static 'css/themes/theme-admin.css' %}"> -->
    <link rel="stylesheet" href="../../static/css/themes/theme-admin.css">
    <!-- Django: <link rel="stylesheet" href="{% static 'css/tweedle-base.css' %}"> -->
    <link rel="stylesheet" href="../../static/css/tweedle-base.css">
    <!-- Django: <link rel="stylesheet" href="{% static 'css/tweedle-components.css' %}"> -->
    <link rel="stylesheet" href="../../static/css/tweedle-components.css">
    <!-- Django: <link rel="stylesheet" href="{% static 'css/pages/notification.css' %}"> -->
    <link rel="stylesheet" href="../../static/css/pages/notification.css">
</head>
<body class="role-admin">

<!-- Django: {% block content %} -->
<main>
    <div class="page-head">
        <h1>Notifications</h1>
    </div>

    <!-- The notification-bell component is the canonical notification UI.
         This page wraps it in a full-page context for the "View All" link.
         Django: {% include 'components/notification-bell.html' %} -->
    <div class="notif-preview-wrapper">
        <!-- In standalone mode, render the component inline. -->
        <!-- In Django, replace this block with the include tag above. -->
        <div class="tw-notif-bell-wrap">
            <!-- Full notification list rendered here by Django view context -->
            <!-- Django: {% for notification in all_notifications %} -->
            <p class="notif-page-placeholder">
                Full notification centre — Django view will render all notifications here.
            </p>
            <!-- Django: {% endfor %} -->
        </div>
    </div>
</main>
<!-- Django: {% endblock %} -->

</body>
</html>
