  File: templates/base.html
  Moved from: cAdmin/cAdmin_baseUI.html (Phase 6 restructure)
  Django template: base shell — extended by all admin_portal templates
  Django view: N/A (base template, not rendered directly)
  Django url:  N/A
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ============================================================
         PAGE TITLE
         Django: {% block title %}Tweedle{% endblock %}
         ============================================================ -->
    <title>Tweedle</title>

    <!-- ============================================================
         GOOGLE FONTS — Poppins (UI) + Lato (sidebar/nav)
         Django: move this link to the base template <head> block.
         Combined URL keeps a single HTTP request.
         ============================================================ -->
    <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600&family=Poppins:wght@400;500;600;700&display=swap">

    <!-- ============================================================
         BOXICONS — icon library used across all pages
         Django: {% static 'vendors/boxicons/css/boxicons.min.css' %}
         ============================================================ -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css">

    <!-- ============================================================
         BOOTSTRAP 5 — grid system and responsive utilities
         Django: {% static 'vendors/bootstrap/css/bootstrap.min.css' %}
         ============================================================ -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- ============================================================
         CSS LOAD ORDER
         1. tweedle-tokens.css   — all CSS custom properties (no rules)
         2. theme-{role}.css     — role color overrides (4 tokens only)
         3. tweedle-base.css     — layout shell, typography, sidebar/nav
         4. tweedle-components.css — all UI components
         5. page-specific CSS    — only when a page needs extra rules
         ============================================================ -->

    <!-- 1. Design tokens -->
    <!-- Django: <link rel="stylesheet" href="{% static 'css/tweedle-tokens.css' %}"> -->
    <link rel="stylesheet" href="../static/css/tweedle-tokens.css">

    <!-- 2. Admin role theme (blue — #3C91E6) -->
    <!-- Django: <link rel="stylesheet" href="{% static 'css/themes/theme-admin.css' %}"> -->
    <link rel="stylesheet" href="../static/css/themes/theme-admin.css">

    <!-- 3. Base layout -->
    <!-- Django: <link rel="stylesheet" href="{% static 'css/tweedle-base.css' %}"> -->
    <link rel="stylesheet" href="../static/css/tweedle-base.css">

    <!-- 4. UI components -->
    <!-- Django: <link rel="stylesheet" href="{% static 'css/tweedle-components.css' %}"> -->
    <link rel="stylesheet" href="../static/css/tweedle-components.css">

    <!-- 5. Page-specific CSS slot -->
    <!-- Django: {% block page_css %}{% endblock %} -->
</head>

<!--
    BODY CLASS controls the active role theme.
    Django: class="role-{% block body_role %}admin{% endblock %}"
    The matching theme file (loaded above) overrides --tw-primary
    for this role. Do NOT set color values inline on <body>.
-->
<body class="role-admin">


<!-- ==============================================================
     SIDEBAR
     Fixed left panel. Collapses to icon-only via .hide class.
     CSS: .sidebar in tweedle-base.css
     ============================================================== -->
<nav class="sidebar" id="sidebar">

    <!-- Brand -->
    <!-- Django: <a href="{% url 'admin_dashboard' %}"> -->
    <div class="sidebar-brand">
        <i class="bx bxs-layer brand-icon" aria-hidden="true"></i>
        <span class="brand-text">Tweedle</span>
    </div>

    <!-- Navigation -->
    <!-- Django active state: add class="nav-link active" on the matching <a>
         and class="nav-item active-item" on the matching <li> server-side -->
    <ul class="sidebar-nav">

        <!-- Dashboard -->
        <!-- Django: {% url 'admin_dashboard' %} -->
        <li class="nav-item active-item">
            <a href="#" class="nav-link active" title="Dashboard">
                <i class="bx bx-grid-alt"></i>
                <span class="nav-label">Dashboard</span>
            </a>
        </li>

        <!-- Inbox -->
        <!-- Django: {% url 'admin_inbox' %} -->
        <li class="nav-item">
            <a href="#" class="nav-link" title="Inbox">
                <i class="bx bx-envelope"></i>
                <span class="nav-label">Inbox</span>
            </a>
        </li>

        <!-- Clients -->
        <!-- Django: {% url 'admin_clients' %} -->
        <li class="nav-item">
            <a href="#" class="nav-link" title="Clients">
                <i class="bx bx-buildings"></i>
                <span class="nav-label">Clients</span>
            </a>
        </li>

        <!-- Team -->
        <!-- Django: {% url 'admin_team' %} -->
        <li class="nav-item">
            <a href="#" class="nav-link" title="Team">
                <i class="bx bx-group"></i>
                <span class="nav-label">Team</span>
            </a>
        </li>

        <!-- Reports -->
        <!-- Django: {% url 'admin_reports' %} -->
        <li class="nav-item">
            <a href="#" class="nav-link" title="Reports">
                <i class="bx bx-bar-chart-alt-2"></i>
                <span class="nav-label">Reports</span>
            </a>
        </li>

    </ul>

</nav>
<!-- END SIDEBAR -->


<!-- ==============================================================
     MAIN CONTENT WRAPPER
     Positioned to the right of the sidebar.
     Width = 100% minus sidebar width (handled by tweedle-base.css).
     ============================================================== -->
<section id="content">

    <!-- ==========================================================
         TOPBAR
         Fixed top navigation bar. CSS: .topbar in tweedle-base.css
         Contains: hamburger toggle, search, notifications, profile.
         ========================================================== -->
    <nav class="topbar">

        <!-- Sidebar collapse / expand toggle -->
        <i class="bx bx-menu" id="hamburger-btn" role="button" aria-label="Toggle sidebar"></i>

        <!-- Global ticket search -->
        <!--
            Django: <form action="{% url 'admin_search' %}" method="get">
        -->
        <form action="#" class="topbar-search-form">
            <div class="topbar-search">
                <input
                    type="search"
                    name="q"
                    placeholder="Search tickets..."
                    aria-label="Search tickets">
                <button type="submit" aria-label="Submit search">
                    <i class="bx bx-search"></i>
                </button>
            </div>
        </form>

        <!-- COMPONENT: notification_bell -->
        <!--
            Django: {% include 'components/notification_bell.html' %}
            Displays the bell icon, unread count badge, and the
            notification dropdown panel (notification.html component).
            The count is injected from context: {{ unread_notification_count }}
        -->
        <a href="#" class="notification" id="notificationBell" aria-label="Notifications">
            <i class="bx bxs-bell"></i>
            <!-- Django: {% if unread_notification_count %} -->
            <span class="num">8</span>
            <!-- Django: {% endif %} -->
        </a>
        <!-- END COMPONENT: notification_bell -->

        <!-- COMPONENT: profile_dropdown -->
        <!--
            Django: {% include 'components/profile_dropdown.html' %}
            Shows the logged-in user's avatar. On click, shows a
            dropdown with: View Profile, Settings, Logout.
            Django: <img src="{{ request.user.profile.avatar.url }}"
                         alt="{{ request.user.get_full_name }}">
        -->
        <a href="#" class="profile" aria-label="Profile">
            <img
                src="../static/images/jinoy.jpg"
                alt="Profile avatar">
        </a>
        <!-- END COMPONENT: profile_dropdown -->

    </nav>
    <!-- END TOPBAR -->


    <!-- ==========================================================
         MAIN PAGE CONTENT
         Each page injects its own content here via Django template
         inheritance. The <main> padding is defined in tweedle-base.css
         via var(--tw-content-padding) = 36px 24px.
         ========================================================== -->
    <main id="main-content">
        <!-- Django: {% block content %}{% endblock %} -->
    </main>
    <!-- END MAIN PAGE CONTENT -->

</section>
<!-- END MAIN CONTENT WRAPPER -->


<!-- ==============================================================
     VENDOR SCRIPTS
     Bootstrap 5 bundle (includes Popper.js for dropdowns/tooltips).
     Django: {% static 'vendors/bootstrap/js/bootstrap.bundle.min.js' %}
     ============================================================== -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Shared admin JS (search, star toggle, filter dropdowns) -->
<!-- Django: <script src="{% static 'js/cAdmin_script.js' %}" defer></script> -->
<script src="../static/js/cAdmin_script.js" defer></script>

<!-- Page-specific JS slot -->
<!-- Django: {% block page_js %}{% endblock %} -->


<!-- ==============================================================
     SHELL JAVASCRIPT
     Self-contained scripts for the base layout only.
     Page-level JS goes in {% block page_js %} above.
     ============================================================== -->
<script>
    /* === SIDEBAR TOGGLE === */
    const sidebar   = document.getElementById('sidebar');
    const hamburger = document.getElementById('hamburger-btn');
    const isMobile  = () => window.innerWidth <= 768;

    hamburger.addEventListener('click', function () {
        if (isMobile()) {
            sidebar.classList.toggle('mobile-open');
        } else {
            sidebar.classList.toggle('hide');
            document.body.classList.toggle('sidebar-hidden');
        }
    });


    /* === ACTIVE NAV ITEM === */
    /* Django: active state is set server-side — add class="nav-link active"
     * on the matching <a> and class="nav-item active-item" on the matching <li>.
     * This fallback handles active state for static-file development only.
     * Django: remove or guard with {% if debug %} when deploying. */
    const navLinks   = document.querySelectorAll('.nav-link');
    const currentPath = window.location.pathname;

    navLinks.forEach(function (link) {
        const href = link.getAttribute('href');
        if (href && href !== '#' && currentPath.includes(href)) {
            navLinks.forEach(function (l) {
                l.classList.remove('active');
                l.closest('.nav-item').classList.remove('active-item');
            });
            link.classList.add('active');
            link.closest('.nav-item').classList.add('active-item');
        }
    });

    /* Fallback: if no URL match, keep first item (Dashboard) active */
    if (!document.querySelector('.nav-link.active')) {
        const first = document.querySelector('.nav-link');
        if (first) {
            first.classList.add('active');
            first.closest('.nav-item').classList.add('active-item');
        }
    }


    /* === RESPONSIVE === */
    function handleResize() {
        if (isMobile()) {
            sidebar.classList.remove('hide');
            document.body.classList.remove('sidebar-hidden');
        }
    }
    window.addEventListener('resize', handleResize);
</script>

</body>
</html>
